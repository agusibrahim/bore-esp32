; PlatformIO Project Configuration for Bore ESP32 Library
;
; This is the root platformio.ini for the bore-esp32 project.
; For building the example, use: cd examples/simple_web_server && pio run

[platformio]
default_envs = esp32-c3

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino

; Build the library and example
build_flags =
    -Ilib/bore/src
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; Serial monitor
monitor_speed = 115200

; Library dependencies
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
